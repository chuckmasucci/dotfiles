# GLX/Backend
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

vsync = true;

# Shadows
shadow = true;
shadow-radius = 7;
shadow-opacity = .25
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Opacity
active-opacity = 1;
inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;

opacity-rule = [
	"90:class_g = 'Rofi'",
];

# Rounded Corners
detect-rounded-corners = true;
round-borders = 12;
corner-radius = 12;
transparent-clipping = 0;

rounded-corners-exclude = [
	"window_type = 'dock'",
];

# Fading
fading = true;
fade-delta = 3;
fade-in-step = 0.028;
fade-out-step = 0.03;

# Active/Inactive control
inactive-dim = 0.25;
